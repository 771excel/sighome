<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시그헌터/생존게임 통합 뷰어 By. JIN</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        :root { --grid-cols: 5; --grid-rows: 2; }
        html, body { background-color: transparent !important; font-family: 'GmarketSans', sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; user-select: none; }
        
        /* 뷰어 전용 스타일 */
        body.viewer-mode #admin-panel { display: none !important; }
        body.viewer-mode #viewer-container { width: 100vw !important; max-width: 100vw !important; padding: 2rem !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #card-grid {
            display: grid; grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr)); grid-template-rows: repeat(var(--grid-rows), minmax(0, 1fr));
            gap: 0.8rem; transition: all 0.5s ease; height: 100%;
        }
        
        .perspective-1000 { perspective: 1000px; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 0.75rem; overflow: hidden; }
        
        .card-front { background: white; display: flex; flex-direction: column; border: 3px solid #cbd5e1; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-back { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 3px solid #475569; transform: rotateY(180deg); display: flex; align-items: center; justify-content: center; }

        /* 16:9 이미지 영역 & 텍스트 꽉 채우기 */
        .img-container { width: 100%; aspect-ratio: 16/9; background: #f8fafc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-bottom: 2px solid #e2e8f0; }
        .text-container { flex: 1; display: flex; flex-col; justify-content: center; align-items: center; background: #f1f5f9; padding: 0.2rem 0.5rem; overflow: hidden; }
        .sig-id { font-size: clamp(20px, calc(100vh / var(--grid-rows) * 0.15), 40px); line-height: 1.1; }
        .sig-name { font-size: clamp(14px, calc(100vh / var(--grid-rows) * 0.08), 30px); line-height: 1.2; width: 100%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

        .vip-glow .card-front { border: 4px solid #fbbf24 !important; box-shadow: 0 0 20px rgba(251, 191, 36, 0.8) !important; animation: pulse-gold 2s infinite; }
        @keyframes pulse-gold { 0%, 100% { box-shadow: 0 0 15px rgba(251, 191, 36, 0.6); } 50% { box-shadow: 0 0 30px rgba(251, 191, 36, 1); } }

        /* 상태 변화: 솔드아웃 -> 멤버 획득 -> 배수 공개 */
        .card-wrapper.is-sold-out .card-front img { filter: grayscale(100%) brightness(0.4); }
        .card-wrapper.is-sold-out .text-container { background-color: #334155; color: #94a3b8; }
        .sold-out-stamp { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.5) rotate(-10deg); background: rgba(220, 38, 38, 0.95); color: white; font-size: 2.5rem; font-weight: 900; padding: 0.5rem 1.5rem; border-radius: 0.5rem; border: 3px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 20; }
        .card-wrapper.is-sold-out .sold-out-stamp { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(-5deg); }

        .card-wrapper.is-claimed .card-front img { filter: grayscale(0%) brightness(1); }
        .card-wrapper.is-claimed .card-front { border-color: #3b82f6 !important; box-shadow: 0 0 20px rgba(59,130,246, 0.8) !important; }
        .card-wrapper.is-claimed .sold-out-stamp { display: none !important; }
        
        .claimed-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 30; border-radius: 0.75rem; }
        .card-wrapper.is-claimed .claimed-overlay { opacity: 1; }
        .claimed-badge { background: linear-gradient(135deg, #2563eb, #1d4ed8); border: 2px solid white; padding: 6px 20px; border-radius: 30px; font-weight: 900; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 1.8rem; text-align: center; margin-bottom: 10px; }
        
        /* 배수 표시 (초기엔 안보임, is-revealed 클래스 추가시 보임) */
        .multiplier-stamp { font-size: 4rem; font-weight: 900; color: #fbbf24; text-shadow: 2px 2px 0 #b45309, -2px -2px 0 #b45309, 2px -2px 0 #b45309, -2px 2px 0 #b45309, 0 5px 15px rgba(0,0,0,0.8); transform: scale(0) rotate(-20deg); opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-wrapper.is-revealed .multiplier-stamp { transform: scale(1) rotate(-10deg); opacity: 1; }

        @keyframes warning-blink { 0%, 100% { background-color: rgba(15, 23, 42, 0.8); border-color: rgba(255,255,255,0.1); } 50% { background-color: rgba(185, 28, 28, 0.7); border-color: #ef4444; } }
        .warning-active { animation: warning-blink 1.5s infinite; }
        #stage-clear-overlay { opacity: 0; pointer-events: none; transform: scale(0.9); transition: all 0.8s; }
        #stage-clear-overlay.show { opacity: 1; transform: scale(1); pointer-events: auto; }

        /* 생존게임 전광판 */
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; position: relative; display: flex; align-items: center; }
        .marquee-content { display: inline-block; animation: marquee 15s linear infinite; font-size: 1.5rem; font-weight: 900; color: #fbbf24; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        #admin-panel { background-color: #0f172a; }
        .admin-input { background: #1e293b; color: white; border: 1px solid #475569; border-radius: 0.25rem; outline: none; padding: 0.25rem; font-size: 0.875rem; text-align: center; transition: border 0.2s; }
        .admin-input:focus { border-color: #3b82f6; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="flex w-full h-screen relative">

    <!-- [좌측] 메인 뷰어 화면 -->
    <div id="viewer-container" class="flex-1 relative flex flex-col justify-between gap-4 p-6 overflow-hidden">
        
        <!-- 상단 헤더: 진행률 / 생존자 전광판 / 타이머 (높이 통일) -->
        <div class="flex justify-between items-stretch z-10 w-full mx-auto h-[80px]">
            <!-- 기본 모드: 완판율 -->
            <div id="progress-wrapper" class="glass-panel p-4 rounded-xl w-[400px] flex flex-col justify-center shadow-xl transition-all h-full">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-white font-bold text-lg tracking-wide">현재 단계 진행률</span>
                    <span id="progress-text" class="text-yellow-400 font-black text-2xl leading-none">0 / 0</span>
                </div>
                <div class="w-full bg-slate-700 rounded-full h-4 overflow-hidden border border-slate-600">
                    <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- 생존게임 모드: 생존자 전광판 -->
            <div id="survival-marquee-wrapper" class="glass-panel p-4 rounded-xl w-[600px] hidden flex-col justify-center shadow-xl border-yellow-500/50 h-full overflow-hidden">
                <div class="text-white font-bold text-sm mb-1 text-center text-yellow-400">🔥 현재 도전 중인 멤버 🔥</div>
                <div class="marquee-container flex-1">
                    <div id="marquee-text" class="marquee-content"></div>
                </div>
            </div>

            <!-- 타이머 -->
            <div id="viewer-timer-box" class="glass-panel px-8 rounded-xl hidden shadow-xl border-2 border-slate-600 transition-colors h-full flex items-center justify-center">
                <span id="viewer-timer" class="text-white font-mono text-6xl font-black tracking-wider drop-shadow-md">10:00</span>
            </div>
        </div>

        <!-- 카드 그리드 영역 -->
        <div class="flex-1 flex flex-col justify-center items-center relative w-full mx-auto z-10 min-h-0 py-2">
            <div id="card-grid" class="w-full h-full perspective-1000"></div>
            
            <div id="empty-state-msg" class="absolute inset-0 flex items-center justify-center">
                <div class="glass-panel px-12 py-10 rounded-2xl border-4 border-dashed border-slate-500 text-center shadow-2xl">
                    <h2 class="text-4xl font-bold text-white mb-3 tracking-widest">방송 준비중</h2>
                    <p class="text-slate-400 text-lg">관리자 패널에서 설정을 마치고 송출을 시작해주세요.</p>
                </div>
            </div>
            
            <div id="stage-clear-overlay" class="absolute inset-0 flex items-center justify-center z-50">
                <div class="bg-red-600/95 backdrop-blur-md border-4 border-white px-20 py-10 rounded-3xl shadow-[0_0_50px_rgba(220,38,38,0.8)] rotate-[-5deg]">
                    <h1 class="text-8xl font-black text-white tracking-tighter drop-shadow-lg">STAGE CLEAR</h1>
                    <p class="text-center text-yellow-300 text-3xl font-bold mt-4 tracking-widest">해당 단계가 종료되었습니다!</p>
                </div>
            </div>
        </div>

        <!-- 하단 배너 -->
        <div id="banner-wrapper" class="hidden w-full mx-auto z-10 shrink-0">
            <div class="bg-gradient-to-r from-yellow-500 via-yellow-400 to-yellow-500 text-black text-center text-[2.5rem] font-black py-4 rounded-xl shadow-[0_0_20px_rgba(250,204,21,0.5)] border-b-8 border-yellow-700">
                <span id="banner-text">시그헌터 목록 (별풍점수 2배)</span>
            </div>
        </div>
    </div>


    <!-- [우측] 관리자 패널 -->
    <div id="admin-panel" class="w-[550px] flex-shrink-0 flex flex-col border-l-4 border-indigo-500 shadow-[-10px_0_20px_rgba(0,0,0,0.5)] z-50 relative">
        
        <!-- 공통 모달 -->
        <div id="custom-modal" class="absolute inset-0 bg-black/80 z-[200] hidden items-center justify-center">
            <div class="bg-slate-800 border border-slate-600 rounded-xl p-6 max-w-sm w-full shadow-2xl text-center mx-4">
                <p id="custom-modal-msg" class="text-white mb-6 whitespace-pre-wrap leading-relaxed text-sm font-bold"></p>
                <div class="flex gap-3 justify-center" id="custom-modal-btns"></div>
            </div>
        </div>

        <!-- 멤버 선택 팝업 -->
        <div id="member-select-modal" class="absolute inset-0 bg-slate-900/90 z-[150] hidden items-center justify-center backdrop-blur-sm">
            <div class="bg-slate-800 border-2 border-blue-500 rounded-xl p-6 max-w-sm w-full shadow-[0_0_30px_rgba(59,130,246,0.3)] mx-4">
                <h3 class="text-white text-lg font-black mb-4 text-center">🎯 대상 멤버 선택</h3>
                <div id="member-btn-list" class="flex flex-wrap gap-2 justify-center max-h-[300px] overflow-y-auto mb-4"></div>
                <button onclick="closeMemberModal()" class="w-full py-2 bg-slate-600 text-white rounded font-bold text-sm hover:bg-slate-500 transition">취소</button>
            </div>
        </div>

        <!-- 미리보기 팝업 -->
        <div id="preview-popup" class="absolute inset-0 bg-slate-900/95 z-[100] hidden flex-col">
            <div class="p-4 border-b border-slate-700 bg-slate-800 flex justify-between items-center shrink-0">
                <h3 id="popup-title" class="text-lg font-black text-yellow-400">00단계 대기목록</h3>
                <button id="close-popup-btn" class="text-red-400 hover:text-white hover:bg-red-600 font-bold px-3 py-1 border border-red-500 rounded transition text-sm">닫기 ✖</button>
            </div>
            <div class="bg-slate-800 p-3 shrink-0 flex flex-col gap-2 border-b border-slate-700">
                <div class="flex gap-2">
                    <textarea id="popup-preview-textarea" class="admin-input flex-1 h-10 text-[11px] text-yellow-300 font-mono resize-none" placeholder="단가 번호를 쉼표로 입력"></textarea>
                    <button id="popup-apply-nums-btn" class="bg-emerald-600 text-white text-[11px] font-bold px-3 rounded shadow hover:bg-emerald-500">단가 적용</button>
                </div>
            </div>
            <div id="popup-content" class="flex-1 p-4 overflow-y-auto grid grid-cols-3 gap-3 content-start"></div>
        </div>

        <!-- 관리자 상단 헤더 & 모드 상태창 -->
        <div class="bg-slate-950 flex flex-col border-b border-slate-800 shrink-0">
            <div class="p-3 flex justify-between items-center">
                <h2 class="text-lg font-black text-white">⚙️ 방송 관리자 패널</h2>
                <button id="btn-copy-link" class="bg-green-600 hover:bg-green-500 text-white text-[11px] font-bold px-3 py-1.5 rounded shadow transition">🔗 OBS 소스 링크 복사</button>
            </div>
            <div id="mode-indicator" class="w-full text-center py-1.5 text-xs font-bold tracking-widest text-slate-900 bg-slate-400 transition-colors">
                일반 모드 활성화 중
            </div>
        </div>

        <!-- ⏱️ 타이머 패널 -->
        <div class="p-4 bg-slate-900 border-b border-slate-700 shadow-xl z-20 shrink-0 relative">
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-600 flex items-center justify-between shadow-inner">
                <label class="block text-xs font-black text-emerald-400">⏱️ 타이머 조작</label>
                <div class="flex items-center justify-center gap-1">
                    <input type="number" id="timer-min" class="admin-input w-12 text-lg font-bold py-1 bg-slate-900" value="10">
                    <span class="text-white font-bold">:</span>
                    <input type="number" id="timer-sec" class="admin-input w-12 text-lg font-bold py-1 bg-slate-900" value="00">
                </div>
                <div class="flex gap-2">
                    <button id="btn-timer-start" class="bg-emerald-600 text-white text-[11px] font-bold px-4 py-2 rounded shadow transition w-14">시작</button>
                    <button id="btn-timer-reset" class="bg-slate-600 hover:bg-slate-500 text-white text-[11px] font-bold px-3 py-2 rounded shadow transition">리셋</button>
                </div>
            </div>
        </div>

        <!-- 스크롤 영역 -->
        <div class="flex-1 p-4 overflow-y-auto space-y-4 custom-scroll relative z-10">
            
            <!-- DB 상태 -->
            <div class="bg-slate-800 p-3 rounded-xl border border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.1)]">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-blue-400">☁️ 파이어베이스 원격 연동 상태</label>
                    <span id="db-status-badge" class="px-2 py-1 text-[10px] font-bold rounded-full bg-slate-700 text-slate-300">연결 대기중</span>
                </div>
                <div class="grid grid-cols-2 gap-2 mt-2 pt-2 border-t border-slate-700">
                    <button id="new-game-btn" class="bg-red-900 hover:bg-red-800 text-red-100 font-bold py-1.5 rounded text-[11px] shadow border border-red-700">🔄 전체 기록 초기화</button>
                    <button id="auto-generate-btn" class="bg-indigo-900 hover:bg-indigo-800 text-indigo-100 font-bold py-1.5 rounded text-[11px] shadow border border-indigo-700">✨ 1~16단계 리셋</button>
                </div>
            </div>

            <!-- 모드 설정 및 멤버 관리 -->
            <div class="bg-slate-800 p-4 rounded-xl border-2 border-purple-500/50 relative">
                <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2">
                    <label class="block text-sm font-bold text-purple-400">🎮 방송 모드 선택 및 멤버 관리</label>
                </div>
                <div class="flex gap-3 mb-3">
                    <label class="flex-1 text-center bg-slate-900 p-2 rounded border border-slate-600 cursor-pointer">
                        <input type="radio" name="gameMode" value="standard" class="hidden peer">
                        <div class="text-xs font-bold text-slate-400 peer-checked:text-blue-400">일반 모드</div>
                    </label>
                    <label class="flex-1 text-center bg-slate-900 p-2 rounded border border-slate-600 cursor-pointer">
                        <input type="radio" name="gameMode" value="hunter" class="hidden peer">
                        <div class="text-xs font-bold text-slate-400 peer-checked:text-purple-400">헌터 (배수)</div>
                    </label>
                    <label class="flex-1 text-center bg-slate-900 p-2 rounded border border-slate-600 cursor-pointer">
                        <input type="radio" name="gameMode" value="survival" class="hidden peer">
                        <div class="text-xs font-bold text-slate-400 peer-checked:text-red-400">생존 게임</div>
                    </label>
                </div>
                
                <div class="bg-slate-900 p-2 rounded border border-slate-700">
                    <label class="block text-xs font-bold text-slate-300 mb-2">👥 멤버 / 생존자 관리</label>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="input-member" class="admin-input flex-1 text-xs" placeholder="멤버 추가">
                        <button id="btn-add-member" class="bg-purple-600 text-white text-[11px] font-bold px-3 rounded">추가</button>
                    </div>
                    <div id="member-list" class="flex flex-col gap-1 max-h-[120px] overflow-y-auto custom-scroll pr-1"></div>
                </div>
            </div>

            <!-- 화면 및 배너 설정 -->
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
                <label class="block text-xs font-bold text-amber-400 mb-2">🎨 화면 배열 및 배너 설정</label>
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-[11px] text-slate-400">가로</span><input type="number" id="input-cols" class="admin-input w-12 text-xs" value="5" min="1" max="10">
                    <span class="text-[11px] text-slate-400">세로</span><input type="number" id="input-rows" class="admin-input w-12 text-xs" value="2" min="1" max="10">
                    <span class="text-[11px] text-slate-400 ml-2">하단 배너</span><input type="text" id="input-banner" class="admin-input flex-1 text-left px-2 text-[11px]" value="시그헌터 목록">
                </div>
                <button id="btn-apply-layout" class="w-full bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold py-1.5 rounded shadow">적용하여 화면에 동기화</button>
            </div>

            <!-- 배수 룰 세팅 -->
            <div class="bg-slate-800 p-3 rounded-xl border border-pink-500/50 shadow-sm">
                <label class="block text-xs font-bold text-pink-400 mb-2">🎲 랜덤 배수 분배 규칙 (헌터 모드용)</label>
                <div class="bg-slate-900 p-2 rounded border border-slate-700 flex flex-col gap-2">
                    <div class="flex items-center gap-2">
                        <input type="radio" name="multiRule" value="range" id="rule-range" checked class="accent-pink-500">
                        <label for="rule-range" class="text-[11px] text-slate-300">최소 <input type="number" id="multi-min" class="admin-input w-10 py-0.5 px-0" value="1"> 배 ~ 최대 <input type="number" id="multi-max" class="admin-input w-10 py-0.5 px-0" value="5"> 배 랜덤</label>
                    </div>
                    <div class="flex items-start gap-2">
                        <input type="radio" name="multiRule" value="exact" id="rule-exact" class="accent-pink-500 mt-1">
                        <div class="flex flex-col">
                            <label for="rule-exact" class="text-[11px] text-slate-300">특정 배수 고정 개수 할당</label>
                            <input type="text" id="multi-exact-str" class="admin-input w-full text-[10px] py-1 mt-1" placeholder="예: 2배:3, 5배:1 (나머진 1배)">
                        </div>
                    </div>
                    <button id="btn-apply-global-multi" class="w-full bg-pink-600 hover:bg-pink-500 text-white text-[10px] font-bold py-1.5 rounded mt-1">현재 설정된 모든 단계(대기목록)에 일괄 적용</button>
                </div>
            </div>

            <!-- 단계 매니저 -->
            <div>
                <div class="flex justify-between items-center mb-3 mt-4">
                    <label class="block text-sm font-bold text-indigo-300">🎲 단계별 설정 및 송출</label>
                    <button id="btn-add-stage" class="text-xs bg-slate-700 hover:bg-slate-600 text-white px-2 py-1 rounded shadow">➕ 추가</button>
                </div>

        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_I1iwH0U26aaBavXqHL7fG32xvwDkF1o", authDomain: "excel-ec5e4.firebaseapp.com",
            projectId: "excel-ec5e4", storageBucket: "excel-ec5e4.firebasestorage.app",

        window.syncToCloud = async (stateObj) => {

                try { await setDoc(window.stateDocRef, stateObj, {merge: false}); } catch(e) { console.error(e); }

        signInAnonymously(auth).then(() => {
            // DB 원본 시그니처 연동
            onSnapshot(doc(db, 'signature_boards', 'main_board_data'), (snapshot) => {

            // 뷰어 모드: 원격 제어 수신
            if (window.isViewerMode) {
                onSnapshot(window.stateDocRef, (docSnap) => {

                        const cloudState = docSnap.data();
                        const prevTimestamp = window.state.broadcastTimestamp;
                        window.state = { ...window.state, ...cloudState };
                        
                        // 화면 레이아웃 동기화
                        document.documentElement.style.setProperty('--grid-cols', state.cols);
                        document.documentElement.style.setProperty('--grid-rows', state.rows);

                        // 타이머 동기화 (Admin에서 On/Off 하거나 Target시간을 바꿀때)
                        if (state.timer.isRunning) {
                            if(!window.timerInterval) window.timerInterval = setInterval(window.tickTimer, 200);
                        } else {
                            clearInterval(window.timerInterval); window.timerInterval = null; window.renderTimerText();
                        }

                        // 송출 명령이 떨어졌을 경우 (애니메이션 렌더링)
                        if (state.broadcastTimestamp && state.broadcastTimestamp !== prevTimestamp) {
                            window.executeBroadcast(state.currentBroadcastStageId, false);
                        } else if (state.currentBroadcastStageId) {
                            // 단순 클릭 상태 업데이트
                            window.updateViewerStateOnly();
                        } else {
                            // 초기화 된 경우
                            document.getElementById('empty-state-msg').style.display = 'flex';

        }).catch(e => console.error(e));
    </script>

    <!-- Core App Logic -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        window.isViewerMode = urlParams.get('viewer') === 'true';
        if (window.isViewerMode) document.body.classList.add('viewer-mode');

        function showModal(msg, isConfirm = false, onConfirm = null) {
            const m = document.getElementById('custom-modal'); const b = document.getElementById('custom-modal-btns');
            document.getElementById('custom-modal-msg').innerText = msg; b.innerHTML = '';
            if (isConfirm) {
                b.innerHTML = `<button class="px-6 py-2 bg-slate-600 text-white rounded font-bold text-xs" onclick="document.getElementById('custom-modal').classList.replace('flex','hidden')">취소</button>
                               <button id="modal-ok-btn" class="px-6 py-2 bg-blue-600 text-white rounded font-bold text-xs">확인</button>`;
                document.getElementById('modal-ok-btn').onclick = () => { m.classList.replace('flex','hidden'); if(onConfirm) onConfirm(); };
            } else { b.innerHTML = `<button class="px-8 py-2 bg-blue-600 text-white rounded font-bold text-xs" onclick="document.getElementById('custom-modal').classList.replace('flex','hidden')">확인</button>`; }
            m.classList.replace('hidden', 'flex');
        }

        const PRESET_STAGES = Array.from({length: 16}, (_, i) => ({
            id: `st_${i+1}`, name: `${String(i+1).padStart(2,'0')}단계`, 
            min: i===15? 20000 : (i*1000 + 1000), max: i===15? 300000 : (i*1000 + 1999), 
            count: 10, mandatory: "", high: 0, timerMin: 10, timerSec: 0, previewNumbers: [], broadcastNumbers: []
        }));
        PRESET_STAGES[9].mandatory = "5000,10000"; PRESET_STAGES[15].mandatory = "40000,50000,77771,100000";

        window.state = {
            cols: 5, rows: 2, bannerText: "시그헌터 목록 (별풍점수 2배)",
            timer: { remaining: 600, isRunning: false, targetEnd: null },
            globalSoldOutList: [], currentBroadcastStageId: null, broadcastTimestamp: null,
            stages: JSON.parse(JSON.stringify(PRESET_STAGES)),
            gameMode: 'standard', // 'standard', 'hunter', 'survival'
            members: [], eliminatedMembers: [], // 생존게임용 탈락자
            multipliers: {}, claimedCards: {}, revealedCards: [] // 카드 상태 제어
        };

        const DOM = {
            inCols: document.getElementById('input-cols'), inRows: document.getElementById('input-rows'), inBanner: document.getElementById('input-banner'),
            memberList: document.getElementById('member-list')
        };

        window.addEventListener('DOMContentLoaded', () => {
            if (!window.isViewerMode) {
                const saved = localStorage.getItem('sigHunterState_v5');
                if(saved) { try { window.state = { ...window.state, ...JSON.parse(saved) }; } catch(e){} }
                DOM.inCols.value = state.cols; DOM.inRows.value = state.rows; DOM.inBanner.value = state.bannerText;
                document.querySelector(`input[name="gameMode"][value="${state.gameMode}"]`).checked = true;
                updateModeIndicator(); renderMembers(); renderAdminStages();
            }
        });

        function saveState() {
            if (window.isViewerMode) return;
            localStorage.setItem('sigHunterState_v5', JSON.stringify(state));
            if(window.syncToCloud) window.syncToCloud(state);
        }

        // --- 관리자 UI 이벤트 바인딩 ---
        if(!window.isViewerMode) {
            document.getElementById('btn-apply-layout').addEventListener('click', () => {
                state.cols = DOM.inCols.value; state.rows = DOM.inRows.value; state.bannerText = DOM.inBanner.value;
                saveState(); showModal("화면 레이아웃 및 배너가 뷰어에 동기화되었습니다.");
            });

            document.querySelectorAll('input[name="gameMode"]').forEach(r => r.addEventListener('change', e => {
                state.gameMode = e.target.value; updateModeIndicator(); saveState(); window.updateViewerStateOnly();
            }));

            document.getElementById('btn-copy-link').addEventListener('click', () => {
                const url = window.location.href.split('?')[0] + "?viewer=true";
                navigator.clipboard.writeText(url).then(() => showModal("OBS 브라우저 소스용 링크 복사 완료!\n\n" + url));
            });

            // 멤버 관리
            document.getElementById('btn-add-member').addEventListener('click', () => {
                const v = document.getElementById('input-member').value.trim();
                if(v && !state.members.includes(v)) { state.members.push(v); document.getElementById('input-member').value=''; saveState(); renderMembers(); window.updateViewerStateOnly(); }
            });

            // 배수 룰 일괄 적용
            document.getElementById('btn-apply-global-multi').addEventListener('click', () => {
                const isExact = document.getElementById('rule-exact').checked;
                state.stages.forEach(stage => applyMultiplierRule(stage, isExact));
                saveState(); renderAdminStages(); showModal("모든 대기목록에 배수 규칙이 일괄 적용되었습니다.\n크게보기/설정 창에서 확인 가능합니다.");
            });
        }

        function updateModeIndicator() {
            const ind = document.getElementById('mode-indicator');
            if(state.gameMode === 'hunter') { ind.innerText = '🎯 헌터 모드 활성화 중 (배수 부여)'; ind.className = 'w-full text-center py-1.5 text-xs font-bold tracking-widest text-white bg-purple-600'; }
            else if(state.gameMode === 'survival') { ind.innerText = '🔥 생존 게임 활성화 중 (탈락자 관리)'; ind.className = 'w-full text-center py-1.5 text-xs font-bold tracking-widest text-white bg-red-600'; }
            else { ind.innerText = '일반 송출 모드'; ind.className = 'w-full text-center py-1.5 text-xs font-bold tracking-widest text-slate-800 bg-slate-300'; }
        }

        function renderMembers() {
            if(!DOM.memberList) return;
            DOM.memberList.innerHTML = state.members.map(m => {
                const isEliminated = state.eliminatedMembers.includes(m);
                return `
                <div class="bg-slate-800 text-white text-[11px] px-2 py-1.5 rounded flex items-center justify-between border ${isEliminated?'border-red-500 opacity-50':'border-slate-600'}">
                    <span class="${isEliminated?'line-through text-red-400':''}">${m}</span>
                    <div class="flex gap-1">
                        ${state.gameMode === 'survival' ? `<button class="bg-slate-600 px-1.5 py-0.5 rounded hover:bg-slate-500" onclick="toggleSurvival('${m}')">${isEliminated?'부활':'탈락'}</button>` : ''}
                        <button class="text-red-400 font-bold px-1" onclick="removeMember('${m}')">✕</button>
                    </div>
                </div>
            `}).join('');
        }
        window.removeMember = (m) => { state.members = state.members.filter(x => x !== m); state.eliminatedMembers = state.eliminatedMembers.filter(x => x !== m); saveState(); renderMembers(); window.updateViewerStateOnly(); };
        window.toggleSurvival = (m) => { if(state.eliminatedMembers.includes(m)) state.eliminatedMembers = state.eliminatedMembers.filter(x=>x!==m); else state.eliminatedMembers.push(m); saveState(); renderMembers(); window.updateViewerStateOnly(); };

        // --- 단계별 렌더링 (관리자) ---
        function renderAdminStages() {
            if(window.isViewerMode) return;
            const container = document.getElementById('stages-container'); container.innerHTML = '';
            state.stages.forEach(stage => {
                const isBroadcasting = state.currentBroadcastStageId === stage.id;
                const div = document.createElement('div');
                div.className = `bg-slate-800 p-3 rounded-lg border ${isBroadcasting ? 'border-green-500 shadow-[0_0_10px_rgba(34,197,94,0.3)]' : 'border-slate-700'} relative transition-all`;
                
                div.innerHTML = `
                    <div class="flex items-center justify-between mb-2 pb-2 border-b border-slate-700 cursor-move handle">
                        <div class="flex items-center gap-2 w-full">
                            <span class="text-slate-500">↕</span>
                            <input type="text" class="admin-input w-24 text-blue-300 font-bold" value="${stage.name}" onchange="updateStageData('${stage.id}', 'name', this.value)">
                            ${isBroadcasting ? '<span class="text-[10px] bg-green-600 text-white px-2 py-0.5 rounded ml-auto">📺 송출중</span>' : ''}
                        </div>
                    </div>
                    <div class="grid grid-cols-6 gap-1 mb-2 bg-slate-900 p-2 rounded border border-slate-700">
                        <div class="flex flex-col"><span class="text-[9px] text-slate-400">최소</span><input type="number" class="admin-input px-0" value="${stage.min}" onchange="updateStageData('${stage.id}','min',this.value)"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-slate-400">최대</span><input type="number" class="admin-input px-0" value="${stage.max}" onchange="updateStageData('${stage.id}','max',this.value)"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-blue-400">개수</span><input type="number" class="admin-input px-0 font-bold" value="${stage.count}" onchange="updateStageData('${stage.id}','count',this.value)"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-yellow-500">1만+</span><input type="number" class="admin-input px-0" value="${stage.high}" onchange="updateStageData('${stage.id}','high',this.value)"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-emerald-400">분</span><input type="number" class="admin-input px-0" value="${stage.timerMin}" onchange="updateStageData('${stage.id}','tmin',this.value)"></div>
                        <div class="flex flex-col"><span class="text-[9px] text-emerald-400">초</span><input type="number" class="admin-input px-0" value="${stage.timerSec}" onchange="updateStageData('${stage.id}','tsec',this.value)"></div>
                    </div>
                    <div class="flex gap-2 items-center mb-2">
                        <input type="text" class="admin-input flex-1 text-left px-2 text-[10px]" value="${stage.mandatory}" onchange="updateStageData('${stage.id}','mand',this.value)" placeholder="필수번호(쉼표구분)">
                        <button class="bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded shadow hover:bg-indigo-500 whitespace-nowrap" onclick="openPreviewPopup('${stage.id}')">🔍 크게보기/설정</button>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-blue-600 hover:bg-blue-500 text-white text-[11px] font-bold py-1.5 w-16 rounded shadow" onclick="executeStageRandom('${stage.id}')">🎲 뽑기</button>
                        <button class="flex-1 bg-red-600 hover:bg-red-500 text-white text-xs font-black py-1.5 rounded shadow flex justify-center gap-1" onclick="triggerBroadcast('${stage.id}')">▶ 화면에 송출 (적용)</button>
                    </div>
                `;
                container.appendChild(div);
            });
            new Sortable(container, { handle: '.handle', animation: 150, onEnd: e => { const item = state.stages.splice(e.oldIndex, 1)[0]; state.stages.splice(e.newIndex, 0, item); saveState(); } });
        }

        window.updateStageData = (id, field, val) => {
            const s = state.stages.find(x => x.id === id); if(!s) return;
            if(field==='name') s.name = val; if(field==='min') s.min = parseInt(val)||0; if(field==='max') s.max = parseInt(val)||0;
            if(field==='count') s.count = parseInt(val)||0; if(field==='high') s.high = parseInt(val)||0; if(field==='mand') s.mandatory = val;
            if(field==='tmin') s.timerMin = parseInt(val)||0; if(field==='tsec') s.timerSec = parseInt(val)||0;
            saveState();
        };

        // --- 랜덤 뽑기 및 배수 규칙 적용 ---
        function applyMultiplierRule(stage, isExact) {
            if(stage.previewNumbers.length === 0) return;
            if(isExact) {
                const ruleStr = document.getElementById('multi-exact-str').value; // e.g. "2:3, 5:1"
                let multiPool = [];
                ruleStr.split(',').forEach(part => {
                    const [multi, count] = part.split(':').map(n => parseInt(n.trim()));
                    if(!isNaN(multi) && !isNaN(count)) for(let i=0; i<count; i++) multiPool.push(multi);
                });
                // 남는 자리는 1로 채우고 섞기
                while(multiPool.length < stage.previewNumbers.length) multiPool.push(1);
                multiPool.sort(() => Math.random() - 0.5);
                stage.previewNumbers.forEach((n, i) => state.multipliers[n] = multiPool[i] || 1);
            } else {
                const min = parseInt(document.getElementById('multi-min').value) || 1;
                const max = parseInt(document.getElementById('multi-max').value) || 1;
                stage.previewNumbers.forEach(n => { state.multipliers[n] = Math.floor(Math.random() * (max - min + 1)) + min; });
            }
        }

        window.executeStageRandom = (id) => {
            if (!window.isFirebaseReady || window.firebaseItems.length === 0) return showModal("Firebase DB 데이터를 불러오는 중입니다.");
            const stage = state.stages.find(s => s.id === id);
            const allOtherDrawn = new Set(); state.stages.forEach(s => { if(s.id !== id) { s.previewNumbers.forEach(n=>allOtherDrawn.add(n)); s.broadcastNumbers.forEach(n=>allOtherDrawn.add(n)); }});
            const pool = window.firebaseItems.map(i => i.id).filter(n => !allOtherDrawn.has(n));
            let drawn = [];
            stage.mandatory.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n)).forEach(n => { if(pool.includes(n)) { drawn.push(n); pool.splice(pool.indexOf(n), 1); } });
            
            let slots = stage.count - drawn.length; let vipPool = pool.filter(n => n >= 10000);
            for(let i=0; i < Math.min(stage.high, slots); i++) { if(vipPool.length>0) { let r=Math.floor(Math.random()*vipPool.length); let p=vipPool[r]; drawn.push(p); vipPool.splice(r,1); pool.splice(pool.indexOf(p),1); } }
            
            slots = stage.count - drawn.length;
            if(slots > 0) { let rangePool = pool.filter(n => n >= stage.min && n <= stage.max); rangePool.sort(()=>Math.random()-0.5); drawn = drawn.concat(rangePool.slice(0, slots)); }
            
            stage.previewNumbers = [...new Set(drawn)].sort((a,b)=>a-b);
            
            // 룰 기반 배수 자동 적용 (관리자 패널이 있을때만)
            if(document.getElementById('rule-exact')) {
                const isExact = document.getElementById('rule-exact').checked;
                applyMultiplierRule(stage, isExact);
            }
            saveState(); renderAdminStages();
        }

        if(!window.isViewerMode) {
            document.getElementById('batch-generate-btn').addEventListener('click', () => {
                if (!window.isFirebaseReady) return showModal("DB 연동 대기중입니다.");
                showModal("전체 단계 목록을 랜덤 생성하시겠습니까?", true, () => { state.stages.forEach(s => executeStageRandom(s.id)); showModal("일괄 생성 완료!"); });
            });
        }

        // --- 미리보기(크게보기) 팝업 ---
        let currentPreviewStageId = null;
        window.openPreviewPopup = (id) => {
            const stage = state.stages.find(s => s.id === id); if(!stage) return;
            currentPreviewStageId = id; document.getElementById('popup-title').innerText = `${stage.name} 설정`;
            document.getElementById('preview-popup').classList.replace('hidden', 'flex'); renderPreviewCards();
        }
        if(!window.isViewerMode) {
            document.getElementById('close-popup-btn').addEventListener('click', () => { document.getElementById('preview-popup').classList.replace('flex', 'hidden'); currentPreviewStageId = null; });
            document.getElementById('popup-apply-nums-btn').addEventListener('click', () => {
                const stage = state.stages.find(s => s.id === currentPreviewStageId); if(!stage) return;
                let nums = document.getElementById('popup-preview-textarea').value.split(',').map(n=>parseInt(n.trim())).filter(n=>!isNaN(n));
                stage.previewNumbers = [...new Set(nums)].sort((a,b)=>a-b);
                stage.previewNumbers.forEach(n => { if(!state.multipliers[n]) state.multipliers[n]=1; });
                saveState(); renderPreviewCards(); renderAdminStages();
            });
        }
        
        function renderPreviewCards() {
            const stage = state.stages.find(s => s.id === currentPreviewStageId); if(!stage) return;
            document.getElementById('popup-preview-textarea').value = stage.previewNumbers.join(', ');
            const content = document.getElementById('popup-content'); content.innerHTML = '';
            stage.previewNumbers.forEach(num => {
                const fbItem = window.firebaseItems.find(i => i.id === num);
                const imgSrc = fbItem ? (fbItem.isFrozen && fbItem.frozenDataUrl ? fbItem.frozenDataUrl : (fbItem.mediaUrl||fbItem.imgUrl)) : '';
                const sigName = fbItem ? fbItem.name.replace(/^\d+[_.\-\s]+/, '') : '이름 없음';
                const multi = state.multipliers[num] || 1;
                
                content.innerHTML += `
                    <div class="bg-slate-800 p-2 rounded border border-slate-600 flex flex-col items-center">
                        <div class="w-full aspect-video bg-slate-900 rounded overflow-hidden flex items-center justify-center mb-1">
                            ${imgSrc ? `<img src="${imgSrc}" class="w-full h-full object-cover">` : '<span class="text-red-500 font-bold text-[10px]">No Img</span>'}
                        </div>
                        <div class="w-full text-center leading-tight mb-1">
                            <div class="text-yellow-400 font-black text-sm">${num}</div>
                            <div class="text-slate-300 text-[10px] truncate w-full">${sigName}</div>
                        </div>
                        <div class="flex items-center justify-between w-full bg-slate-900 p-1.5 rounded">
                            <span class="text-[10px] text-slate-400 font-bold">배수</span>
                            <input type="number" class="admin-input w-12 text-[11px] py-0.5" value="${multi}" min="1" onchange="updateMultiplier(${num}, this.value)">
                        </div>
                    </div>`;
            });
        }
        window.updateMultiplier = (num, val) => { state.multipliers[num] = parseInt(val)||1; saveState(); };

        // --- 송출 및 화면 렌더링 ---
        window.triggerBroadcast = (id) => {
            state.broadcastTimestamp = Date.now(); // 뷰어 강제 렌더링 애니메이션 트리거
            executeBroadcast(id, false);
        }

        window.executeBroadcast = function(id, isRestore = false) {
            if (!window.isFirebaseReady) return; const stage = state.stages.find(s => s.id === id);
            if(stage.previewNumbers.length === 0 && !isRestore && !window.isViewerMode) return showModal("대기목록이 비어있습니다.");
            
            if(!isRestore) { stage.broadcastNumbers = [...stage.previewNumbers]; state.currentBroadcastStageId = id; saveState(); }

            // UI 보이기 설정
            document.getElementById('empty-state-msg').style.display = 'none';
            document.getElementById('banner-wrapper').classList.remove('hidden');
            document.getElementById('viewer-timer-box').classList.remove('hidden');
            document.getElementById('stage-clear-overlay').classList.remove('show');
            document.getElementById('banner-text').innerText = state.bannerText;
            
            // 모드에 따른 상단 패널 (진행률 vs 전광판)
            if (state.gameMode === 'survival') {
                document.getElementById('progress-wrapper').classList.replace('flex', 'hidden');
                document.getElementById('survival-marquee-wrapper').classList.replace('hidden', 'flex');
            } else {
                document.getElementById('survival-marquee-wrapper').classList.replace('flex', 'hidden');
                document.getElementById('progress-wrapper').classList.replace('hidden', 'flex');
            }

            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            // 16:9 비율 유지 & 텍스트를 위한 그리드 갭/비율 맞춤 (CSS var로 처리됨)
            
            stage.broadcastNumbers.forEach((num, i) => {
                const fbItem = window.firebaseItems.find(item => item.id === num);
                const imgSrc = fbItem ? (fbItem.isFrozen && fbItem.frozenDataUrl ? fbItem.frozenDataUrl : (fbItem.mediaUrl || fbItem.imgUrl)) : '';
                const sigName = fbItem ? fbItem.name.replace(/^\d+[_.\-\s]+/, '') : '이름 없음';
                
                const isSoldOut = state.globalSoldOutList.includes(num);
                const isClaimed = !!state.claimedCards[num];
                const isRevealed = state.revealedCards.includes(num);
                const isVIP = num >= 10000;
                const multi = state.multipliers[num] || 1;

                const wrapper = document.createElement('div');
                wrapper.className = `card-wrapper cursor-pointer w-full h-full relative ${isVIP ? 'vip-glow' : ''} ${isSoldOut ? 'is-sold-out' : ''} ${isClaimed ? 'is-claimed' : ''} ${isRevealed ? 'is-revealed' : ''}`;
                wrapper.dataset.number = num; 
                
                // 관리자만 클릭 허용
                if(!window.isViewerMode) wrapper.onclick = () => handleCardClick(num, wrapper);

                wrapper.innerHTML = `
                    <div class="card-inner ${isRestore ? '' : 'is-flipped'}" style="transition-delay: ${i * 100}ms">
                        <div class="card-front">
                            <div class="img-container">
                                ${imgSrc ? `<img src="${imgSrc}" class="w-full h-full object-cover">` : '<span class="text-red-500 font-bold">이미지 없음</span>'}
                            </div>
                            <div class="text-container">
                                <span class="sig-id font-black ${isSoldOut && !isClaimed ? 'text-slate-400' : 'text-red-600'} drop-shadow-sm">[ ${num} ]</span>
                                <span class="sig-name font-bold ${isSoldOut && !isClaimed ? 'text-slate-500' : 'text-slate-800'}">${sigName}</span>
                            </div>
                        </div>
                        <div class="card-back"><span class="text-6xl font-black text-slate-500 drop-shadow-md">?</span></div>
                    </div>
                    <div class="sold-out-stamp">SOLD OUT</div>
                    <div class="claimed-overlay">
                        <div class="claimed-badge">${state.claimedCards[num] || ''}</div>
                        ${state.gameMode === 'hunter' ? `<div class="multiplier-stamp">x${multi}</div>` : ''}
                    </div>
                `;
                grid.appendChild(wrapper);
                if(!isRestore) setTimeout(() => { const inner = wrapper.querySelector('.card-inner'); if(inner) inner.classList.remove('is-flipped'); }, 100);
            });

            if(!isRestore) {
                clearInterval(window.timerInterval);
                const tMin = stage.timerMin || 10; const tSec = stage.timerSec || 0;
                state.timer.remaining = tMin * 60 + tSec; state.timer.targetEnd = Date.now() + (state.timer.remaining * 1000); state.timer.isRunning = true;
                if(!window.isViewerMode) { document.getElementById('timer-min').value = tMin; document.getElementById('timer-sec').value = tSec; updateTimerBtnUI(); }
                window.timerInterval = setInterval(window.tickTimer, 200); window.renderTimerText();
                saveState(); // 뷰어 트리거용
            }
            if(!window.isViewerMode) renderAdminStages(); 
            window.updateViewerStateOnly(); // 상태 업데이트 (전광판 등)
        }

        // --- 실시간 렌더링 업데이트 (DOM 갈아끼우지 않고 클래스만 제어) ---
        window.updateViewerStateOnly = function() {
            if(!state.currentBroadcastStageId) return;
            const stage = state.stages.find(s => s.id === state.currentBroadcastStageId);
            if(!stage) return;
            
            stage.broadcastNumbers.forEach(num => {
                const wrapper = document.querySelector(`.card-wrapper[data-number="${num}"]`);
                if(wrapper) {
                    const isSoldOut = state.globalSoldOutList.includes(num);
                    const isClaimed = !!state.claimedCards[num];
                    const isRevealed = state.revealedCards.includes(num);

                    // 클래스 초기화
                    wrapper.classList.remove('is-sold-out', 'is-claimed', 'is-revealed');
                    
                    if (isSoldOut && !isClaimed) wrapper.classList.add('is-sold-out');
                    if (isClaimed) {
                        wrapper.classList.add('is-claimed');
                        const badge = wrapper.querySelector('.claimed-badge'); if(badge) badge.innerText = state.claimedCards[num];
                    }
                    if (isRevealed) wrapper.classList.add('is-revealed');
                }
            });

            // UI 업데이트
            const total = stage.broadcastNumbers.length; 
            const soldCount = stage.broadcastNumbers.filter(n => state.globalSoldOutList.includes(n) || state.claimedCards[n]).length;
            const percent = total > 0 ? (soldCount / total) * 100 : 0;

            const pw = document.getElementById('progress-wrapper');
            document.getElementById('progress-text').innerText = `${soldCount} / ${total}`; 
            document.getElementById('progress-bar').style.width = `${percent}%`;
            if(percent >= 80 && percent < 100) pw.classList.add('warning-active'); else pw.classList.remove('warning-active');
            if(percent === 100 && total > 0) document.getElementById('stage-clear-overlay').classList.add('show'); else document.getElementById('stage-clear-overlay').classList.remove('show');

            // 생존게임 전광판 업데이트
            if(state.gameMode === 'survival') {
                const claimedNames = Object.values(state.claimedCards);
                // 생존자: 전체 멤버 중 (탈락자 제외) && (현재 라운드 획득자 제외)
                const survivors = state.members.filter(m => !state.eliminatedMembers.includes(m) && !claimedNames.includes(m));
                document.getElementById('marquee-text').innerText = survivors.length > 0 ? survivors.join(' 🏃‍♂️ ') : '남은 도전자 없음';
            }

            if(!window.isViewerMode) {
                document.getElementById('undo-count').innerText = `${soldCount}개 기록됨`; 
                const ul = document.getElementById('undo-list-container'); ul.innerHTML = '';
                if(soldCount === 0) ul.innerHTML = '<div class="text-xs text-slate-600 w-full text-center py-2">기록이 없습니다.</div>';
                else {
                    stage.broadcastNumbers.filter(n => state.globalSoldOutList.includes(n) || state.claimedCards[n]).forEach(num => {
                        const claimTxt = state.claimedCards[num] ? `<span class="text-blue-400">(${state.claimedCards[num]})</span>` : '';
                        const btn = document.createElement('button');
                        btn.className = "bg-slate-800 hover:bg-red-800 border border-slate-600 text-white text-[11px] px-2 py-1 rounded flex items-center gap-1 transition group";
                        btn.innerHTML = `<span class="text-red-400 group-hover:text-white">↺ 복구</span> <span class="font-bold ml-1">${num}</span> ${claimTxt}`;
                        btn.onclick = () => { 
                            state.globalSoldOutList = state.globalSoldOutList.filter(n=>n!==num); 
                            delete state.claimedCards[num]; 
                            state.revealedCards = state.revealedCards.filter(n=>n!==num);
                            saveState(); window.updateViewerStateOnly(); 
                        };
                        ul.appendChild(btn);
                    });
                }
            }
        }

        // --- 카드 클릭 사이클 제어 ---
        let pendingClaimNum = null; 
        function handleCardClick(num, wrapperElement) {
            const isSold = state.globalSoldOutList.includes(num); 
            const isClaimed = !!state.claimedCards[num];
            const isRevealed = state.revealedCards.includes(num);

            if (state.gameMode === 'standard') {
                // 일반 모드: Toggle SoldOut
                if (!isSold) state.globalSoldOutList.push(num);
                else state.globalSoldOutList = state.globalSoldOutList.filter(n => n !== num);
            } 
            else if (state.gameMode === 'hunter') {
                // 헌터 모드: (1)솔드아웃 -> (2)멤버선택 팝업 -> (3)배수공개 -> (4)초기화
                if (!isSold && !isClaimed) {
                    state.globalSoldOutList.push(num); // 1. 솔드아웃
                } else if (isSold && !isClaimed) {
                    openMemberModal(num); // 2. 멤버 지정 팝업
                    return; 
                } else if (isClaimed && !isRevealed) {
                    state.revealedCards.push(num); // 3. 배수 공개
                } else {
                    // 4. 초기화
                    state.globalSoldOutList = state.globalSoldOutList.filter(n => n !== num);
                    delete state.claimedCards[num];
                    state.revealedCards = state.revealedCards.filter(n => n !== num);
                }
            } 
            else if (state.gameMode === 'survival') {
                // 생존 모드: (1)멤버선택 팝업 -> (2)초기화 (솔드아웃 없음)
                if (!isClaimed) {
                    openMemberModal(num, true); // 생존자만
                    return;
                } else {
                    delete state.claimedCards[num];
                }
            }

            saveState(); window.updateViewerStateOnly();
        }

        function openMemberModal(num, survivalOnly = false) {
            pendingClaimNum = num;
            let targetMembers = state.members;
            if (survivalOnly) targetMembers = targetMembers.filter(m => !state.eliminatedMembers.includes(m));
            
            document.getElementById('member-btn-list').innerHTML = targetMembers.map(m => 
                `<button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded shadow transition" onclick="assignMember('${m}')">${m}</button>`
            ).join('');
            document.getElementById('member-select-modal').classList.replace('hidden', 'flex');
        }

        window.assignMember = function(member) {
            if(!pendingClaimNum) return;
            state.claimedCards[pendingClaimNum] = member;
            if(state.gameMode === 'hunter' && !state.globalSoldOutList.includes(pendingClaimNum)) state.globalSoldOutList.push(pendingClaimNum);
            closeMemberModal(); saveState(); window.updateViewerStateOnly();
        }
        window.closeMemberModal = function() { document.getElementById('member-select-modal').classList.replace('flex', 'hidden'); pendingClaimNum = null; }

        // --- 타이머 동기화 ---
        window.timerInterval = null;
        function updateTimerBtnUI() {
            const btn = document.getElementById('btn-timer-start');
            if(state.timer.isRunning) { btn.innerText = "정지"; btn.classList.replace('bg-emerald-600', 'bg-red-600'); }
            else { btn.innerText = "시작"; btn.classList.replace('bg-red-600', 'bg-emerald-600'); }
        }
        window.tickTimer = function() {
            if(!state.timer.isRunning) return;
            state.timer.remaining = Math.max(0, Math.ceil((state.timer.targetEnd - Date.now()) / 1000));
            window.renderTimerText(); 
            if(state.timer.remaining <= 0) { clearInterval(window.timerInterval); state.timer.isRunning = false; if(!window.isViewerMode) { updateTimerBtnUI(); saveState(); } }
        }
        window.renderTimerText = function() {
            const m = Math.floor(state.timer.remaining / 60).toString().padStart(2, '0'); const s = (state.timer.remaining % 60).toString().padStart(2, '0');
            const td = document.getElementById('viewer-timer'); const tb = document.getElementById('viewer-timer-box');
            td.innerText = `${m}:${s}`;
            if(state.timer.remaining > 0 && state.timer.remaining <= 60) { tb.classList.add('border-red-500', 'bg-red-900/30'); td.classList.add('text-red-500', 'animate-pulse'); } 
            else { tb.classList.remove('border-red-500', 'bg-red-900/30'); td.classList.remove('text-red-500', 'animate-pulse'); }
        }

        if(!window.isViewerMode) {
            document.getElementById('btn-timer-start').addEventListener('click', () => {
                if(state.timer.isRunning) { state.timer.isRunning = false; clearInterval(window.timerInterval); } 
                else {
                    const m = parseInt(document.getElementById('timer-min').value)||0; const s = parseInt(document.getElementById('timer-sec').value)||0;
                    if(state.timer.remaining <= 0) state.timer.remaining = m*60 + s;
                    state.timer.targetEnd = Date.now() + (state.timer.remaining * 1000); state.timer.isRunning = true; window.timerInterval = setInterval(window.tickTimer, 200);
                }
                updateTimerBtnUI(); saveState();
            });
            document.getElementById('btn-timer-reset').addEventListener('click', () => {
                state.timer.isRunning = false; clearInterval(window.timerInterval); updateTimerBtnUI();
                state.timer.remaining = (parseInt(document.getElementById('timer-min').value)||0)*60 + (parseInt(document.getElementById('timer-sec').value)||0); window.renderTimerText(); saveState();
            });
        }
    </script>
</body>
</html>
