                    if (typeof SuperGif === 'undefined') {
                        this.showToast('GIF 디코딩 라이브러리를 불러올 수 없습니다. 인터넷 연결을 확인해주세요.');

                    const container = document.getElementById('modal_gif_container');
                    
                    let targetUrl = this.modalItem.originalGifUrl || this.modalItem.imgUrl;
                    let objectUrl = null;

                    try {
                        const response = await fetch(targetUrl, { cache: "no-store" });
                        if (!response.ok) throw new Error('Network response was not ok');
                        const blob = await response.blob();
                        objectUrl = URL.createObjectURL(blob);
                        targetUrl = objectUrl;
                    } catch (e) {
                        console.warn("CORS fetch failed, using original URL fallback", e);
